<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Money</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      width: 390px;
      min-height: 844px;
      background: #0c0c0c;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Subtle top radial glow matching the screenshot */
    .phone::before {
      content: '';
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 220px;
      background: radial-gradient(ellipse at center, rgba(60,60,60,0.45) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 10px;
    }

    .header-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.6px;
      color: #fff;
    }

    .header-search {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Tab Selector ───────────────────────────── */
    .tab-bar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      margin: 4px 22px 14px;
      background: #1c1c1e;
      border-radius: 50px;
      padding: 3px;
      width: fit-content;
    }

    .tab {
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      line-height: 1;
    }

    .tab.active {
      background: #3a3a3c;
      color: #fff;
      font-weight: 600;
    }

    .tab.inactive {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
    }

    /* ── Scroll Content ─────────────────────────── */
    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    /* ── Cash Balance Card ──────────────────────── */
    .cash-card {
      background: #1c1c1e;
      border-radius: 22px;
      padding: 18px 20px 22px;
    }

    .cash-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .cash-label {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: -0.1px;
    }

    .cash-label .dots {
      font-size: 8px;
      letter-spacing: 3px;
      line-height: 1;
      vertical-align: middle;
      color: rgba(255, 255, 255, 0.6);
    }

    .cash-label .acct {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.6);
    }

    .cash-label .chev {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.4);
      margin-left: 1px;
      font-weight: 300;
    }

    .cash-amount {
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      color: #fff;
    }

    /* Eye-slash icon */
    .eye-icon {
      opacity: 0.45;
    }

    /* ── Action Buttons ─────────────────────────── */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      background: #1c1c1e;
      border: none;
      border-radius: 16px;
      padding: 17px 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }

    /* ── Green Status Row ───────────────────────── */
    .status-row {
      background: #1c1c1e;
      border-radius: 16px;
      padding: 15px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Green phone-shaped icon */
    .green-badge {
      width: 28px;
      height: 28px;
      background: #0f2e13;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .status-sub {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: -0.1px;
    }

    /* ── Savings Card ───────────────────────────── */
    .savings-card {
      background: #1c1c1e;
      border-radius: 22px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .savings-label {
      font-size: 13.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 3px;
      letter-spacing: -0.1px;
    }

    .savings-amount {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      line-height: 1.05;
    }

    .savings-interest {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.38);
      margin-top: 4px;
      letter-spacing: -0.1px;
    }

    /* Two overlapping coin/boost icons */
    .coin-stack {
      display: flex;
      align-items: center;
    }

    .coin {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #0f2e13;
      border: 2px solid #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .coin:nth-child(2) {
      margin-left: -12px;
    }

    /* ── More for You ───────────────────────────── */
    .section-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      padding: 4px 0 2px;
    }

    /* ── Bottom strip (partially visible cards) ─── */
    .bottom-strip {
      position: relative;
      z-index: 1;
      background: #0c0c0c;
      border-top: 1px solid #1a1a1a;
      padding: 12px 14px 8px;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* "Bito" partially visible text on left edge */
    .bito-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      letter-spacing: -0.1px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 28px; /* clipped */
    }

    /* White filled "$3" chip */
    .active-chip {
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      border-radius: 50px;
      padding: 7px 16px;
      white-space: nowrap;
    }

    .bottom-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      position: relative;
    }

    .notif-badge {
      position: absolute;
      top: -1px;
      right: -1px;
      background: #ff3b30;
      color: #fff;
      font-size: 9.5px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #0c0c0c;
      line-height: 1;
    }

    .buy-sell-label {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: rgba(255,255,255,0.85);
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="header">
    <div class="header-title">Money</div>
    <div class="header-search">
      <!-- Search icon -->
      <svg width="21" height="21" viewBox="0 0 21 21" fill="none">
        <circle cx="9.5" cy="9.5" r="7" stroke="rgba(255,255,255,0.85)" stroke-width="1.9"/>
        <path d="M15 15L19 19" stroke="rgba(255,255,255,0.85)" stroke-width="1.9" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active">
      <!-- Lock icon SVG -->
      <svg width="11" height="13" viewBox="0 0 11 13" fill="none">
        <rect x="1.5" y="5" width="8" height="7.2" rx="1.8" stroke="white" stroke-width="1.5"/>
        <path d="M3.2 5V3.8a2.3 2.3 0 0 1 4.6 0V5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="5.5" cy="8.6" r="1" fill="white"/>
      </svg>
      Locked
    </div>
    <div class="tab inactive">$BentleeGreen</div>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Cash Balance Card -->
    <div class="cash-card">
      <div class="cash-top-row">
        <div class="cash-label">
          <span>Cash balance</span>
          <span class="dots">••</span>
          <span class="acct">2456</span>
          <span class="chev">›</span>
        </div>
        <!-- Eye-slash icon -->
        <svg class="eye-icon" width="23" height="17" viewBox="0 0 23 17" fill="none">
          <path d="M1.5 1.5L21.5 15.5" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M5.5 5.2C3.1 6.7 1.5 8.6 1 9.5c1 1.2 4.8 6.5 10.5 6.5 2 0 3.8-.6 5.3-1.6" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
          <path d="M9.5 2.8C10.2 2.6 10.8 2.5 11.5 2.5c5.7 0 9.5 5.3 10.5 6.5-.5.8-1.6 2.2-3.3 3.5" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
          <path d="M8.6 9.5a2.9 2.9 0 0 0 4.8 2.2M14.3 7.6a2.9 2.9 0 0 0-3.7-.9" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="cash-amount">$3.73</div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-row">
      <button class="btn">Add money</button>
      <button class="btn">Withdraw</button>
    </div>

    <!-- Green Status Row -->
    <div class="status-row">
      <div class="status-left">
        <!-- Green phone/signal icon -->
        <div class="green-badge">
          <svg width="14" height="18" viewBox="0 0 14 18" fill="none">
            <!-- Phone body -->
            <rect x="2.5" y="0.5" width="9" height="13" rx="2" fill="#32d74b"/>
            <!-- Screen cutout -->
            <rect x="4" y="2" width="6" height="7" rx="1" fill="#0f2e13"/>
            <!-- Home button -->
            <circle cx="7" cy="11.5" r="1" fill="#0f2e13"/>
            <!-- Stand/base -->
            <rect x="5" y="13.5" width="4" height="1.5" rx="0.5" fill="#32d74b"/>
            <rect x="3" y="15" width="8" height="1.5" rx="0.5" fill="#32d74b"/>
          </svg>
        </div>
        <span class="status-text">Green status</span>
      </div>
      <span class="status-sub">In progress</span>
    </div>

    <!-- Savings Card -->
    <div class="savings-card">
      <div>
        <div class="savings-label">Savings</div>
        <div class="savings-amount">$57.71</div>
        <div class="savings-interest">Up to 3.25% interest</div>
      </div>
      <!-- Two overlapping coin icons -->
      <div class="coin-stack">
        <div class="coin">
          <!-- Pixel-art style coin / money bag -->
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <ellipse cx="11" cy="14" rx="7" ry="6" fill="#32d74b" opacity="0.9"/>
            <ellipse cx="11" cy="13.5" rx="5.5" ry="4.5" fill="#0f2e13"/>
            <text x="11" y="16.5" text-anchor="middle" font-size="7" font-weight="700" fill="#32d74b" font-family="-apple-system,sans-serif">$</text>
            <ellipse cx="11" cy="7.5" rx="3.5" ry="3" fill="#32d74b" opacity="0.9"/>
            <rect x="9" y="4" width="4" height="4" rx="0.5" fill="#32d74b" opacity="0.6"/>
          </svg>
        </div>
        <div class="coin">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <ellipse cx="11" cy="14" rx="7" ry="6" fill="#32d74b" opacity="0.9"/>
            <ellipse cx="11" cy="13.5" rx="5.5" ry="4.5" fill="#0f2e13"/>
            <text x="11" y="16.5" text-anchor="middle" font-size="7" font-weight="700" fill="#32d74b" font-family="-apple-system,sans-serif">$</text>
            <ellipse cx="11" cy="7.5" rx="3.5" ry="3" fill="#32d74b" opacity="0.9"/>
            <rect x="9" y="4" width="4" height="4" rx="0.5" fill="#32d74b" opacity="0.6"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- More for you heading -->
    <div class="section-title">More for you</div>

  </div>

  <!-- Bottom strip (partially visible content peek) -->
  <div class="bottom-strip">
    <div class="bottom-row">
      <!-- "Bito" partially clipped on far left -->
      <div class="bito-label">Bito</div>

      <!-- Active white "$3" chip -->
      <div class="active-chip">$3</div>

      <!-- Dollar sign icon -->
      <div class="bottom-icon-btn">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
          <text x="11" y="15.5" text-anchor="middle" font-size="12" font-weight="600" fill="rgba(255,255,255,0.65)" font-family="-apple-system,sans-serif">$</text>
        </svg>
      </div>

      <!-- Activity / refresh circle icon with badge -->
      <div class="bottom-icon-btn">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
          <path d="M7 11a4 4 0 1 0 4-4" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" stroke-linecap="round"/>
          <polyline points="6.5,8 7,11 10,10.5" stroke="rgba(255,255,255,0.65)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="notif-badge">4</div>
      </div>

      <!-- "Buy and sell" label -->
      <div class="buy-sell-label">Buy and sell</div>
    </div>
  </div>

</div>
</body>
</html>
