<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Money</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .phone {
      width: 390px;
      min-height: 844px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 0;
      height: 50px;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .signal-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal-bars span {
      background: #fff;
      width: 3px;
      border-radius: 1px;
    }

    .signal-bars span:nth-child(1) { height: 4px; }
    .signal-bars span:nth-child(2) { height: 6px; }
    .signal-bars span:nth-child(3) { height: 9px; }
    .signal-bars span:nth-child(4) { height: 12px; opacity: 0.3; }

    .wifi-icon {
      width: 16px;
      height: 12px;
      position: relative;
    }

    .wifi-icon svg {
      width: 16px;
      height: 12px;
    }

    .battery-container {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .battery-pct {
      font-size: 12px;
      font-weight: 500;
      color: #fff;
    }

    .battery {
      width: 25px;
      height: 12px;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 3px;
      position: relative;
      padding: 1.5px;
    }

    .battery::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 5px;
      background: rgba(255,255,255,0.4);
      border-radius: 0 1px 1px 0;
    }

    .battery-fill {
      height: 100%;
      width: 90%;
      background: #4cd964;
      border-radius: 1.5px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px 16px;
    }

    .header-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .search-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tab Selector */
    .tab-selector {
      display: flex;
      align-items: center;
      margin: 0 20px 16px;
      background: #1c1c1c;
      border-radius: 30px;
      padding: 4px;
      width: fit-content;
      gap: 4px;
    }

    .tab {
      padding: 7px 18px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab.active {
      background: #2e2e2e;
      color: #fff;
      font-weight: 600;
    }

    .tab.inactive {
      color: rgba(255,255,255,0.6);
    }

    .lock-icon {
      font-size: 12px;
    }

    /* Main scroll area */
    .main {
      flex: 1;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Cash Balance Card */
    .cash-card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 20px 20px 22px;
    }

    .cash-balance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .cash-balance-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
    }

    .cash-dots {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.75);
    }

    .cash-acct {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }

    .cash-chevron {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-left: 2px;
    }

    .eye-slash {
      color: rgba(255,255,255,0.5);
      font-size: 18px;
    }

    .cash-amount {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1;
      color: #fff;
      margin-top: 4px;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      flex: 1;
      background: #1e1e1e;
      border: none;
      border-radius: 14px;
      padding: 16px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.2px;
    }

    /* Green Status Row */
    .status-row {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .green-icon {
      width: 28px;
      height: 28px;
      background: #1d3a1f;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .green-icon-inner {
      width: 10px;
      height: 16px;
      background: #30d158;
      border-radius: 2px;
      position: relative;
    }

    .green-icon-inner::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background: #1d3a1f;
      border-radius: 50%;
    }

    .status-label {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    .status-progress {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
    }

    /* Savings Card */
    .savings-card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .savings-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .savings-label {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
      margin-bottom: 2px;
    }

    .savings-amount {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.8px;
      color: #fff;
      line-height: 1.1;
    }

    .savings-interest {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }

    .savings-icons {
      display: flex;
      gap: -6px;
    }

    .savings-coin {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: #1d3a1f;
      border: 2px solid #0a0a0a;
    }

    .savings-coin:nth-child(2) {
      margin-left: -10px;
    }

    /* More for you */
    .more-section {
      margin-top: 6px;
    }

    .more-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #fff;
      margin-bottom: 14px;
    }

    /* Bottom Bar */
    .bottom-bar {
      background: #111;
      border-top: 1px solid #222;
      padding: 12px 20px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: auto;
    }

    .bottom-chip {
      background: #252525;
      border-radius: 25px;
      padding: 8px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .bottom-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
    }

    .bottom-icon-badge {
      position: relative;
    }

    .badge {
      position: absolute;
      top: -2px;
      right: -4px;
      background: #ff3b30;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #111;
    }

    .bottom-label {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: rgba(255,255,255,0.85);
    }

    /* Gradient overlay at bottom of scroll area */
    .fade-overlay {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #0a0a0a);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-time">12:06</div>
      <div class="status-icons">
        <div class="signal-bars">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.4C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.4L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="white"/>
          <path d="M8 5.5C9.4 5.5 10.7 6.1 11.6 7L13 5.5C11.7 4.3 10 3.5 8 3.5C6 3.5 4.3 4.3 3 5.5L4.4 7C5.3 6.1 6.6 5.5 8 5.5Z" fill="white"/>
          <path d="M8 8.5C8.8 8.5 9.5 8.8 10.1 9.3L8 11.5L5.9 9.3C6.5 8.8 7.2 8.5 8 8.5Z" fill="white"/>
        </svg>
        <div class="battery-container">
          <span class="battery-pct">32</span>
          <div class="battery">
            <div class="battery-fill" style="width: 32%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="header-title">Money</div>
      <div class="header-right">
        <div class="search-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6.5" stroke="white" stroke-width="1.8"/>
            <path d="M14 14L18 18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Tab Selector -->
    <div class="tab-selector">
      <div class="tab active">
        <span class="lock-icon">🔒</span>
        Locked
      </div>
      <div class="tab inactive">$BentleeGreen</div>
    </div>

    <!-- Main Content -->
    <div class="main">

      <!-- Cash Balance Card -->
      <div class="cash-card">
        <div class="cash-balance-row">
          <div class="cash-balance-label">
            <span>Cash balance</span>
            <span class="cash-dots">••</span>
            <span class="cash-acct">2456</span>
            <span class="cash-chevron">›</span>
          </div>
          <div class="eye-slash">
            <svg width="22" height="16" viewBox="0 0 24 18" fill="none">
              <path d="M2 2L22 16" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.5 5C4.2 6.4 2.5 8.5 2 9c.8 1 4.5 6 10 6 1.8 0 3.4-.5 4.8-1.3" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <path d="M9.5 3.3C10.3 3.1 11.1 3 12 3c5.5 0 9.2 5 10 6-.5.7-1.5 2-3 3.2" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <circle cx="12" cy="9" r="3" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" fill="none"/>
            </svg>
          </div>
        </div>
        <div class="cash-amount">$3.73</div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="action-btn">Add money</button>
        <button class="action-btn">Withdraw</button>
      </div>

      <!-- Green Status Row -->
      <div class="status-row">
        <div class="status-left">
          <div class="green-icon">
            <svg width="14" height="20" viewBox="0 0 14 20" fill="none">
              <rect x="3" y="0" width="8" height="14" rx="4" fill="#30d158"/>
              <rect x="5.5" y="14" width="3" height="6" rx="1.5" fill="#30d158"/>
              <rect x="2" y="18" width="10" height="2" rx="1" fill="#30d158"/>
            </svg>
          </div>
          <span class="status-label">Green status</span>
        </div>
        <span class="status-progress">In progress</span>
      </div>

      <!-- Savings Card -->
      <div class="savings-card">
        <div class="savings-left">
          <div class="savings-label">Savings</div>
          <div class="savings-amount">$57.71</div>
          <div class="savings-interest">Up to 3.25% interest</div>
        </div>
        <div class="savings-icons">
          <div class="savings-coin">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <circle cx="13" cy="13" r="13" fill="#1d3a1f"/>
              <text x="13" y="18" text-anchor="middle" font-size="14" fill="#30d158" font-family="-apple-system,sans-serif" font-weight="700">$</text>
            </svg>
          </div>
          <div class="savings-coin">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <circle cx="13" cy="13" r="13" fill="#1d3a1f"/>
              <text x="13" y="18" text-anchor="middle" font-size="14" fill="#30d158" font-family="-apple-system,sans-serif" font-weight="700">$</text>
            </svg>
          </div>
        </div>
      </div>

      <!-- More for you -->
      <div class="more-section">
        <div class="more-title">More for you</div>
      </div>

    </div>

    <!-- Fade overlay -->
    <div class="fade-overlay"></div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <div class="bottom-chip">$3</div>
      <div class="bottom-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
          <path d="M11 6v5l3 2" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="bottom-icon bottom-icon-badge" style="position:relative;">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
          <path d="M7 11 Q11 6 15 11 Q11 16 7 11Z" fill="rgba(255,255,255,0.7)"/>
        </svg>
        <div class="badge">4</div>
      </div>
      <div class="bottom-label">Buy and sell</div>
    </div>

  </div>
</body>
</html>
