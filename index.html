<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Money</title>
<style>
  :root{
    --bg:#000000;
    --card:#1b1b1d;
    --card2:#202022;
    --btn:#1f1f21;
    --text:#ffffff;
    --gray:#8c8c90;
    --gray2:#76767a;
    --green:#00d533;
    --red:#ff2d2d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{background:#111;height:100%;}
  body{
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }

  /* Phone screen: iPhone @3x => 1170/3 = 390 x 844 */
  .screen{
    position:relative;
    width:390px;height:844px;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    border-radius:0;
  }
  /* subtle warm glow top-right from avatar area */
  .screen::before{
    content:"";position:absolute;top:-40px;right:-20px;width:260px;height:240px;
    background:radial-gradient(closest-side, rgba(120,70,70,.45), rgba(60,40,40,0) 70%);
    pointer-events:none;z-index:0;
  }
  .screen::after{
    content:"";position:absolute;top:0;left:0;right:0;height:300px;
    background:linear-gradient(180deg, rgba(40,38,40,.65), rgba(0,0,0,0) 100%);
    pointer-events:none;z-index:0;
  }
  .screen>*{position:relative;z-index:1;}

  /* ---------- Status bar ---------- */
  .status{
    height:54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 4px;
  }
  .status .time{font-size:16px;font-weight:600;letter-spacing:.2px;}
  .status .right{display:flex;align-items:center;gap:7px;}
  .status .right svg{display:block;}
  .batt{display:flex;align-items:center;gap:5px;}
  .batt .num{font-size:15px;font-weight:600;}

  /* ---------- Header ---------- */
  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px 12px;
  }
  .header h1{font-size:27px;font-weight:700;letter-spacing:.2px;}
  .header .actions{display:flex;align-items:center;gap:14px;}
  .iconbtn{
    width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,.10);
    display:flex;align-items:center;justify-content:center;
  }
  .avatar{
    width:36px;height:36px;border-radius:50%;
    background:
      radial-gradient(circle at 50% 32%, #d9a07a 0 30%, rgba(217,160,122,0) 55%),
      radial-gradient(circle at 50% 78%, #6b3f2e 0 45%, rgba(107,63,46,0) 70%),
      linear-gradient(160deg,#caa07f,#7a4a36);
    border:1px solid rgba(255,255,255,.12);
  }

  /* ---------- Tabs row ---------- */
  .tabs{
    margin:4px 16px 0;
    background:#161618;
    border-radius:22px;
    height:48px;
    display:flex;align-items:center;
    padding:5px;
    position:relative;
  }
  .tab{
    flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
    height:100%;font-size:15px;
  }
  .tab.active{
    background:#2c2c2e;border-radius:18px;color:#fff;font-weight:600;flex:0 0 128px;
  }
  .tab.inactive{color:var(--gray);font-weight:500;}
  .tab .lock{display:flex;}
  /* little curved notch under tabs (peeking card) */
  .notch{
    height:14px;margin:0 16px;position:relative;
  }
  .notch::after{
    content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:120px;height:26px;border-radius:0 0 60px 60px / 0 0 26px 26px;
    background:#161618;
  }

  /* ---------- Balance ---------- */
  .balance{padding:16px 22px 6px;}
  .balance .row{display:flex;align-items:center;justify-content:space-between;}
  .balance .label{display:flex;align-items:center;gap:8px;color:#fff;font-size:15px;font-weight:500;}
  .balance .label .dots{color:var(--gray);letter-spacing:2px;font-weight:700;}
  .balance .label .num{color:var(--gray);}
  .balance .label .chev{color:#fff;font-size:16px;margin-left:2px;}
  .balance .amount{font-size:62px;font-weight:700;letter-spacing:-1px;margin-top:8px;line-height:1;}

  /* ---------- Action buttons ---------- */
  .actions-row{display:flex;gap:14px;padding:22px 16px 0;}
  .pill{
    flex:1;height:58px;background:var(--btn);border-radius:30px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:600;color:#fff;
  }

  /* ---------- generic card ---------- */
  .card{
    margin:14px 16px 0;background:var(--card);border-radius:22px;
    padding:18px 18px;
  }
  .card.green-status{
    display:flex;align-items:center;justify-content:space-between;
  }
  .green-status .left{display:flex;align-items:center;gap:12px;}
  .green-status .gicon{
    width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
  }
  .green-status .title{font-size:16px;font-weight:600;}
  .green-status .status-r{color:var(--gray);font-size:15px;}

  /* ---------- savings ---------- */
  .savings{position:relative;}
  .savings .s-label{color:#fff;font-size:15px;font-weight:500;}
  .savings .s-amt{font-size:30px;font-weight:700;margin-top:6px;}
  .savings .s-sub{color:var(--gray);font-size:14px;margin-top:4px;}
  .savings .bags{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:flex;gap:8px;}
  .bag{font-size:26px;line-height:1;}

  /* ---------- More for you ---------- */
  .more-title{padding:24px 20px 0;font-size:22px;font-weight:700;}

  /* ---------- bottom peeking card ---------- */
  .bottom{
    margin:14px 16px 0;background:var(--card);border-radius:22px 22px 0 0;
    padding:18px 18px 0;height:120px;overflow:hidden;
  }
  .bottom .b-head{color:var(--gray);font-size:13px;}
  .bottom .b-title{color:#6e6e72;font-size:30px;font-weight:700;margin-top:2px;}
  .bottom-bar{
    position:absolute;left:0;right:0;bottom:0;height:74px;
    background:#000;display:flex;align-items:center;gap:26px;padding:0 30px;
  }
  .chip{
    background:#fff;color:#000;height:38px;border-radius:20px;
    display:flex;align-items:center;justify-content:center;gap:4px;
    padding:0 18px;font-size:17px;font-weight:700;
  }
  .b-ico{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#fff;position:relative;}
  .b-badge{
    position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
    min-width:18px;height:18px;border-radius:9px;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
    border:2px solid #000;
  }

  /* home indicator */
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:3px;background:#fff;opacity:.95;z-index:5;}
</style>
</head>
<body>
  <div class="screen">

    <!-- status bar -->
    <div class="status">
      <div class="time">12:06</div>
      <div class="right">
        <!-- signal -->
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
          <rect x="0" y="8"  width="3" height="4"  rx="1" fill="#fff"/>
          <rect x="5" y="5.5" width="3" height="6.5" rx="1" fill="#fff"/>
          <rect x="10" y="3" width="3" height="9"  rx="1" fill="#fff" opacity=".35"/>
          <rect x="15" y="0.5" width="3" height="11.5" rx="1" fill="#fff" opacity=".35"/>
        </svg>
        <!-- wifi -->
        <svg width="18" height="13" viewBox="0 0 18 13" fill="#fff">
          <path d="M9 2.3c2.6 0 5 1 6.8 2.7l1.2-1.3C14.9 1.4 12 .2 9 .2S3.1 1.4.9 3.7l1.2 1.3C3.9 3.3 6.4 2.3 9 2.3z"/>
          <path d="M9 6c1.5 0 2.9.6 4 1.6l1.2-1.3C12.8 4.9 11 4.1 9 4.1s-3.8.8-5.2 2.2L5 7.6C6.1 6.6 7.5 6 9 6z"/>
          <path d="M9 9.5l2-2.1C10.5 6.9 9.8 6.6 9 6.6s-1.5.3-2 .8l2 2.1z"/>
        </svg>
        <!-- battery -->
        <div class="batt">
          <span class="num">32</span>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
            <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#fff" stroke-opacity=".4"/>
            <rect x="2" y="2" width="9" height="9" rx="2" fill="#fff"/>
            <path d="M24 4v5c.9-.3 1.5-1.1 1.5-2.5S24.9 4.3 24 4z" fill="#fff" fill-opacity=".5"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- header -->
    <div class="header">
      <h1>Money</h1>
      <div class="actions">
        <div class="iconbtn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="avatar"></div>
      </div>
    </div>

    <!-- tabs -->
    <div class="tabs">
      <div class="tab active">
        <span class="lock">
          <svg width="13" height="15" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="10" width="16" height="11" rx="2.5" fill="#fff"/>
            <path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="#fff" stroke-width="2.3" fill="none"/>
          </svg>
        </span>
        Locked
      </div>
      <div class="tab inactive">$BentleeGreen</div>
    </div>
    <div class="notch"></div>

    <!-- balance -->
    <div class="balance">
      <div class="row">
        <div class="label">
          Cash balance
          <span class="dots">••</span>
          <span class="num">2456</span>
          <span class="chev">›</span>
        </div>
        <!-- eye-off -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M2 12s3.5-7 10-7c2 0 3.7.6 5.1 1.5M22 12s-3.5 7-10 7c-2 0-3.7-.6-5.1-1.5"
                stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="3" stroke="#fff" stroke-width="1.8"/>
          <line x1="3" y1="3" x2="21" y2="21" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="amount">$3.73</div>
    </div>

    <!-- action buttons -->
    <div class="actions-row">
      <div class="pill">Add money</div>
      <div class="pill">Withdraw</div>
    </div>

    <!-- green status -->
    <div class="card green-status">
      <div class="left">
        <div class="gicon">
          <svg width="18" height="26" viewBox="0 0 18 26" fill="none">
            <rect x="1" y="1" width="16" height="24" rx="4" stroke="var(--green)" stroke-width="2"/>
            <path d="M9 6l-3 6h3l-3 6 7-8h-3l3-4z" fill="var(--green)"/>
          </svg>
        </div>
        <div class="title">Green status</div>
      </div>
      <div class="status-r">In progress</div>
    </div>

    <!-- savings -->
    <div class="card savings">
      <div class="s-label">Savings</div>
      <div class="s-amt">$57.71</div>
      <div class="s-sub">Up to 3.25% interest</div>
      <div class="bags">
        <span class="bag">💰</span>
        <span class="bag">💸</span>
      </div>
    </div>

    <!-- more for you -->
    <div class="more-title">More for you</div>

    <!-- bottom peeking card -->
    <div class="bottom">
      <div class="b-head">Bitcoin</div>
      <div class="b-title">Buy and sell</div>
    </div>

    <!-- bottom nav bar -->
    <div class="bottom-bar">
      <div class="chip">$3</div>
      <div class="b-ico">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff">
          <text x="12" y="19" font-size="20" font-weight="700" text-anchor="middle" font-family="Arial">$</text>
        </svg>
      </div>
      <div class="b-ico">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="2"/>
          <path d="M12 7v5l3 2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="b-badge">4</span>
      </div>
    </div>

    <div class="home-ind"></div>
  </div>
</body>
</html>
