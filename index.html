<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Money</title>
<style>
  /* Cash App in-app UI uses SF Pro (iOS system font). Apple devices use the real
     system font via -apple-system; Inter (open-source, metric-near-identical to
     SF Pro) is embedded so every other platform renders identically. */
  @font-face{font-family:'UI';src:local('SF Pro Text'),url('assets/Inter-400.ttf') format('truetype');font-weight:400;}
  @font-face{font-family:'UI';src:local('SF Pro Text'),url('assets/Inter-500.ttf') format('truetype');font-weight:500;}
  @font-face{font-family:'UI';src:local('SF Pro Text'),url('assets/Inter-600.ttf') format('truetype');font-weight:600;}
  @font-face{font-family:'UI';src:local('SF Pro Display'),url('assets/Inter-700.ttf') format('truetype');font-weight:700;}

  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{background:#0c0c0c;height:100%;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;
    font-family:'UI',-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,sans-serif;}

  /* every element is absolutely positioned at its exact measured px coordinate */
  .screen{position:relative;width:390px;height:844px;background:#000;color:#fff;overflow:hidden;
    letter-spacing:-0.2px;}
  .screen>*{position:absolute;}
  /* warm avatar glow + top fade */
  .glow{top:-50px;right:-30px;width:250px;height:220px;
    background:radial-gradient(closest-side,rgba(150,95,90,.38),rgba(80,50,48,0) 72%);}

  /* ---- top account card (gradient, rounded top) ---- */
  .acct-card{left:16px;top:128px;width:358px;height:74px;border-radius:24px 24px 0 0;
    background:linear-gradient(180deg,#343436 0%,#262628 55%,#1b1b1d 100%);}
  /* black content card overlapping the account card; its rounded top edge is the visible seam */
  .content-card{left:16px;top:193px;width:358px;height:205px;border-radius:30px 30px 0 0;background:#000;}

  /* ---- status bar ---- */
  .time{left:42px;top:17px;font-size:16px;font-weight:600;letter-spacing:0;}
  .sbar{right:24px;top:18px;display:flex;align-items:center;gap:6px;}
  .sbar .n32{font-size:15px;font-weight:600;letter-spacing:0;}

  /* ---- header ---- */
  .title{left:18px;top:64px;font-size:28px;font-weight:700;letter-spacing:-0.6px;}
  .search{top:63px;right:67px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.10);
    display:flex;align-items:center;justify-content:center;}
  .avatar{top:63px;right:19px;width:38px;height:38px;border-radius:50%;
    background:#222 url('assets/avatar.png') center/cover;}

  /* ---- tabs ---- */
  .locked{left:16px;top:147px;height:46px;padding:0 20px;border-radius:23px;background:#2c2c2e;
    display:flex;align-items:center;gap:9px;font-size:17px;font-weight:600;}
  .bentlee{right:40px;top:152px;font-size:19px;font-weight:500;color:#6a6a6a;letter-spacing:-0.3px;}
  /* faint peeking arc */
  .arc{left:120px;top:198px;width:150px;height:54px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,.09);clip-path:inset(0 0 60% 0);}

  /* ---- balance ---- */
  .bal-label{left:24px;top:207px;display:flex;align-items:center;font-size:15px;font-weight:500;}
  .bal-label .dots{display:inline-flex;gap:4px;margin:0 8px;}
  .bal-label .dots i{width:6px;height:6px;border-radius:50%;background:#fff;}
  .bal-label .acct{color:#fff;}
  .bal-label .chev{color:#fff;font-size:15px;opacity:.85;margin-left:7px;}
  .eye{right:23px;top:206px;}
  .amount{left:23px;top:224px;font-size:60px;font-weight:700;letter-spacing:-2px;line-height:1.18;}

  /* ---- action buttons ---- */
  .btns{left:16px;top:388px;width:358px;height:52px;display:flex;gap:13px;}
  .btn{flex:1;background:#1a1a1a;border-radius:26px;display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:600;}

  /* ---- cards ---- */
  .green-status{left:16px;top:456px;width:358px;height:88px;border-radius:24px;background:#1a1a1a;}
  .gs-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);}
  .gs-title{position:absolute;left:56px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:600;}
  .gs-right{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:16px;color:#8c8c90;}

  .savings{left:16px;top:560px;width:358px;height:132px;border-radius:24px;background:#1a1a1a;}
  .sv-label{position:absolute;left:24px;top:28px;font-size:15px;font-weight:500;}
  .sv-amt{position:absolute;left:24px;top:39px;font-size:31px;font-weight:700;letter-spacing:-1px;}
  .sv-sub{position:absolute;left:24px;top:90px;font-size:14px;color:#8c8c90;}
  .sv-icons{position:absolute;right:21px;top:50%;transform:translateY(-50%);
    width:109px;height:71px;background:url('assets/savings_icons.png') center/contain no-repeat;}

  /* ---- more for you ---- */
  .more{left:26px;top:724px;font-size:22px;font-weight:700;letter-spacing:-0.4px;}

  /* ---- bitcoin peeking card ---- */
  .btc{left:16px;top:752px;width:358px;height:92px;border-radius:24px 24px 0 0;background:#1a1a1a;}
  .btc-label{position:absolute;left:24px;top:16px;font-size:13px;font-weight:500;color:#8c8c90;}
  .btc-title{position:absolute;left:23px;top:27px;font-size:30px;font-weight:700;letter-spacing:-0.6px;color:#6a6a6e;}

  /* ---- floating capsule tab bar ---- */
  .tabbar{left:27px;width:335px;height:68px;bottom:17px;border-radius:34px;
    background:rgba(26,26,26,.72);border:0.5px solid rgba(255,255,255,.08);
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);}
  .tabbar .tab{position:absolute;top:50%;transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;color:#b6b6b6;}
  .tab.chip{left:68px;width:98px;height:58px;border-radius:29px;background:#353435;color:#fff;
    font-size:19px;font-weight:700;letter-spacing:-0.5px;}
  .tab.dollar{left:168px;font-size:24px;font-weight:700;}
  .tab.clock{left:262px;width:34px;height:34px;}
  .badge{position:absolute;top:-3px;right:-9px;background:#ff3b30;color:#fff;min-width:20px;height:20px;
    border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
    padding:0 5px;line-height:1;}
</style>
</head>
<body>
  <div class="screen">
    <div class="glow"></div>
    <div class="acct-card"></div>
    <div class="content-card"></div>

    <!-- status bar -->
    <div class="time">12:06</div>
    <div class="sbar">
      <svg width="18" height="12" viewBox="0 0 18 12">
        <rect x="0" y="8" width="3" height="4" rx="1" fill="#fff"/>
        <rect x="5" y="5.5" width="3" height="6.5" rx="1" fill="#fff"/>
        <rect x="10" y="3" width="3" height="9" rx="1" fill="#fff" opacity=".35"/>
        <rect x="15" y="0.5" width="3" height="11.5" rx="1" fill="#fff" opacity=".35"/>
      </svg>
      <svg width="17" height="12" viewBox="0 0 18 13" fill="#fff">
        <path d="M9 2.3c2.6 0 5 1 6.8 2.7l1.2-1.3C14.9 1.4 12 .2 9 .2S3.1 1.4.9 3.7l1.2 1.3C3.9 3.3 6.4 2.3 9 2.3z"/>
        <path d="M9 6c1.5 0 2.9.6 4 1.6l1.2-1.3C12.8 4.9 11 4.1 9 4.1s-3.8.8-5.2 2.2L5 7.6C6.1 6.6 7.5 6 9 6z"/>
        <path d="M9 9.5l2-2.1C10.5 6.9 9.8 6.6 9 6.6s-1.5.3-2 .8l2 2.1z"/>
      </svg>
      <span class="n32">32</span>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#fff" stroke-opacity=".4"/>
        <rect x="2" y="2" width="9" height="9" rx="2" fill="#fff"/>
        <path d="M24 4v5c.9-.3 1.5-1.1 1.5-2.5S24.9 4.3 24 4z" fill="#fff" fill-opacity=".5"/>
      </svg>
    </div>

    <!-- header -->
    <div class="title">Money</div>
    <div class="search">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="avatar"></div>

    <!-- tabs -->
    <div class="locked">
      <svg width="13" height="15" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="10" width="16" height="11" rx="2.5" fill="#fff"/>
        <path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="#fff" stroke-width="2.4"/>
      </svg>
      Locked
    </div>
    <div class="bentlee">$BentleeGreen</div>
    <div class="arc"></div>

    <!-- balance -->
    <div class="bal-label">
      Cash balance
      <span class="dots"><i></i><i></i></span>
      <span class="acct">2456</span>
      <span class="chev">›</span>
    </div>
    <div class="eye">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none">
        <path d="M3.5 12c1.9-3.3 5-5.3 8.5-5.3s6.6 2 8.5 5.3c-1.9 3.3-5 5.3-8.5 5.3S5.4 15.3 3.5 12z"
              stroke="#fff" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="2.6" stroke="#fff" stroke-width="1.8"/>
        <line x1="4" y1="20" x2="20" y2="4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="amount">$3.73</div>

    <!-- action buttons -->
    <div class="btns">
      <div class="btn">Add money</div>
      <div class="btn">Withdraw</div>
    </div>

    <!-- green status -->
    <div class="green-status">
      <div class="gs-icon">
        <svg width="20" height="28" viewBox="0 0 20 28" fill="none">
          <rect x="1.2" y="1.2" width="17.6" height="25.6" rx="4.5" stroke="#66dd45" stroke-width="2.2"/>
          <path d="M10 6l-3.4 7h3.2l-3 8 8-9.5h-3.4L14 6z" fill="#66dd45"/>
        </svg>
      </div>
      <div class="gs-title">Green status</div>
      <div class="gs-right">In progress</div>
    </div>

    <!-- savings -->
    <div class="savings">
      <div class="sv-label">Savings</div>
      <div class="sv-amt">$57.71</div>
      <div class="sv-sub">Up to 3.25% interest</div>
      <div class="sv-icons"></div>
    </div>

    <!-- more for you -->
    <div class="more">More for you</div>

    <!-- bitcoin peeking card -->
    <div class="btc">
      <div class="btc-label">Bitcoin</div>
      <div class="btc-title">Buy and sell</div>
    </div>

    <!-- floating capsule tab bar -->
    <div class="tabbar">
      <div class="tab chip">$3</div>
      <div class="tab dollar">$</div>
      <div class="tab clock">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="#b6b6b6" stroke-width="2"/>
          <path d="M12 7.2v5l3.3 2" stroke="#b6b6b6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="badge">4</span>
      </div>
    </div>
  </div>
</body>
</html>
