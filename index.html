<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Money</title>
<style>
  /* Cash App in-app UI uses SF Pro (iOS system font). We load real SF Pro on Apple
     devices via -apple-system, and embed Inter (open-source, metric-near-identical
     to SF Pro) so it renders identically on every other platform. */
  @font-face{font-family:'UI';src:local('SF Pro Text'),local('-apple-system'),url('assets/Inter-400.ttf') format('truetype');font-weight:400;}
  @font-face{font-family:'UI';src:local('SF Pro Text'),url('assets/Inter-500.ttf') format('truetype');font-weight:500;}
  @font-face{font-family:'UI';src:local('SF Pro Text'),url('assets/Inter-600.ttf') format('truetype');font-weight:600;}
  @font-face{font-family:'UI';src:local('SF Pro Display'),url('assets/Inter-700.ttf') format('truetype');font-weight:700;}

  :root{
    --bg:#000000;
    --card:#1a1a1a;       /* green-status / savings / buttons */
    --pill:#1c1c1e;       /* locked pill / small surfaces */
    --text:#ffffff;
    --gray:#8c8c90;
    --gray-dim:#444444;   /* $BentleeGreen */
    --green:#66dd45;
    --red:#ff2d2d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  html,body{background:#0c0c0c;height:100%;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;
    font-family:'UI',-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,sans-serif;}

  .screen{
    position:relative;width:390px;height:844px;background:var(--bg);
    color:var(--text);overflow:hidden;letter-spacing:-0.1px;
  }
  /* top fade + warm avatar glow */
  .screen::before{content:"";position:absolute;top:0;left:0;right:0;height:300px;z-index:0;
    background:linear-gradient(180deg,#1d1d1f 0%,rgba(20,20,21,.55) 28%,rgba(0,0,0,0) 60%);}
  .screen::after{content:"";position:absolute;top:-50px;right:-30px;width:260px;height:230px;z-index:0;
    background:radial-gradient(closest-side,rgba(150,95,90,.40),rgba(80,50,48,0) 72%);pointer-events:none;}
  .screen>*{position:relative;z-index:1;}

  /* ---------- status bar ---------- */
  .status{height:54px;display:flex;align-items:center;justify-content:space-between;padding:14px 24px 0;}
  .status .time{font-size:16px;font-weight:600;letter-spacing:0;font-variant-numeric:tabular-nums;}
  .status .right{display:flex;align-items:center;gap:6px;}
  .batt{display:flex;align-items:center;gap:4px;}
  .batt .num{font-size:15px;font-weight:600;letter-spacing:0;}

  /* ---------- header ---------- */
  .header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 10px;}
  .header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
  .header .actions{display:flex;align-items:center;gap:12px;}
  .iconbtn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.09);
    display:flex;align-items:center;justify-content:center;}
  .avatar{width:38px;height:38px;border-radius:50%;background:#222;
    background-image:url('assets/avatar.png');background-size:cover;background-position:center;}

  /* ---------- tabs ---------- */
  .tabs{margin:6px 16px 0;height:48px;display:flex;align-items:center;gap:6px;}
  .tab-active{height:44px;padding:0 22px;background:var(--pill);border-radius:22px;
    display:flex;align-items:center;gap:9px;font-size:16px;font-weight:600;color:#fff;}
  .tab-inactive{flex:1;text-align:center;color:var(--gray-dim);font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  /* faint curved arc (peeking card) */
  .arc{height:18px;margin:0 16px;position:relative;overflow:hidden;}
  .arc::after{content:"";position:absolute;left:50%;top:6px;transform:translateX(-50%);
    width:150px;height:60px;border-radius:50%;border:1.5px solid rgba(255,255,255,.10);}

  /* ---------- balance ---------- */
  .balance{padding:14px 22px 0;}
  .bal-row{display:flex;align-items:center;justify-content:space-between;}
  .bal-label{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:500;color:#fff;}
  .bal-label .dots{color:var(--gray);font-size:10px;letter-spacing:2px;}
  .bal-label .acct{color:var(--gray);font-weight:500;}
  .bal-label .chev{color:#fff;font-size:15px;margin-left:1px;opacity:.9;}
  .amount{font-size:62px;font-weight:700;letter-spacing:-1.5px;line-height:1.04;margin-top:6px;}

  /* ---------- action buttons ---------- */
  .actions-row{display:flex;gap:13px;padding:24px 16px 0;}
  .btn{flex:1;height:56px;background:var(--card);border-radius:28px;
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;}

  /* ---------- cards ---------- */
  .card{margin:16px 16px 0;background:var(--card);border-radius:24px;padding:0 18px;}
  .green-status{height:88px;display:flex;align-items:center;justify-content:space-between;}
  .gs-left{display:flex;align-items:center;gap:13px;}
  .gs-title{font-size:16px;font-weight:600;}
  .gs-right{color:var(--gray);font-size:16px;font-weight:400;}

  .savings{height:133px;position:relative;display:flex;flex-direction:column;justify-content:center;}
  .sv-label{font-size:15px;font-weight:500;}
  .sv-amt{font-size:30px;font-weight:700;letter-spacing:-1px;margin-top:5px;}
  .sv-sub{color:var(--gray);font-size:14px;font-weight:400;margin-top:6px;}
  .sv-icons{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    width:118px;height:78px;background:url('assets/savings_icons.png') center/contain no-repeat;}

  /* ---------- more for you ---------- */
  .more-title{padding:26px 20px 0;font-size:22px;font-weight:700;letter-spacing:-0.4px;}

  /* ---------- bottom peeking card + nav ---------- */
  .bottom{margin:16px 16px 0;background:var(--card);border-radius:24px 24px 0 0;
    padding:18px 20px 0;height:130px;overflow:hidden;}
  .b-head{color:var(--gray);font-size:13px;font-weight:500;}
  .b-title{color:#6a6a6e;font-size:30px;font-weight:700;letter-spacing:-0.6px;margin-top:3px;}

  .navbar{position:absolute;left:0;right:0;bottom:0;height:78px;background:#000;
    display:flex;align-items:center;gap:30px;padding:0 32px;}
  .chip{background:#fff;color:#000;height:40px;border-radius:20px;padding:0 19px;
    display:flex;align-items:center;font-size:18px;font-weight:700;letter-spacing:-0.5px;}
  .nav-ico{position:relative;display:flex;align-items:center;justify-content:center;width:40px;height:40px;color:#fff;}
  .nav-ico .dollar{font-size:22px;font-weight:700;}
  .badge{position:absolute;top:-2px;right:-4px;background:var(--red);color:#fff;min-width:18px;height:18px;
    border-radius:9px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
    padding:0 4px;border:2px solid #000;}
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:3px;background:#fff;z-index:5;}
</style>
</head>
<body>
  <div class="screen">

    <!-- status bar -->
    <div class="status">
      <div class="time">12:06</div>
      <div class="right">
        <svg width="18" height="12" viewBox="0 0 18 12">
          <rect x="0" y="8" width="3" height="4" rx="1" fill="#fff"/>
          <rect x="5" y="5.5" width="3" height="6.5" rx="1" fill="#fff"/>
          <rect x="10" y="3" width="3" height="9" rx="1" fill="#fff" opacity=".35"/>
          <rect x="15" y="0.5" width="3" height="11.5" rx="1" fill="#fff" opacity=".35"/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 18 13" fill="#fff">
          <path d="M9 2.3c2.6 0 5 1 6.8 2.7l1.2-1.3C14.9 1.4 12 .2 9 .2S3.1 1.4.9 3.7l1.2 1.3C3.9 3.3 6.4 2.3 9 2.3z"/>
          <path d="M9 6c1.5 0 2.9.6 4 1.6l1.2-1.3C12.8 4.9 11 4.1 9 4.1s-3.8.8-5.2 2.2L5 7.6C6.1 6.6 7.5 6 9 6z"/>
          <path d="M9 9.5l2-2.1C10.5 6.9 9.8 6.6 9 6.6s-1.5.3-2 .8l2 2.1z"/>
        </svg>
        <div class="batt">
          <span class="num">32</span>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
            <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#fff" stroke-opacity=".4"/>
            <rect x="2" y="2" width="9" height="9" rx="2" fill="#fff"/>
            <path d="M24 4v5c.9-.3 1.5-1.1 1.5-2.5S24.9 4.3 24 4z" fill="#fff" fill-opacity=".5"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- header -->
    <div class="header">
      <h1>Money</h1>
      <div class="actions">
        <div class="iconbtn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="avatar"></div>
      </div>
    </div>

    <!-- tabs -->
    <div class="tabs">
      <div class="tab-active">
        <svg width="13" height="15" viewBox="0 0 24 24" fill="none">
          <rect x="4" y="10" width="16" height="11" rx="2.5" fill="#fff"/>
          <path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="#fff" stroke-width="2.4"/>
        </svg>
        Locked
      </div>
      <div class="tab-inactive">$BentleeGreen</div>
    </div>
    <div class="arc"></div>

    <!-- balance -->
    <div class="balance">
      <div class="bal-row">
        <div class="bal-label">
          Cash balance
          <span class="dots">●●</span>
          <span class="acct">2456</span>
          <span class="chev">›</span>
        </div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M2 12s3.5-7 10-7c2.1 0 3.9.7 5.3 1.6M22 12s-3.5 7-10 7c-2.1 0-3.9-.7-5.3-1.6"
                stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="3" stroke="#fff" stroke-width="1.7"/>
          <line x1="3.5" y1="3.5" x2="20.5" y2="20.5" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="amount">$3.73</div>
    </div>

    <!-- action buttons -->
    <div class="actions-row">
      <div class="btn">Add money</div>
      <div class="btn">Withdraw</div>
    </div>

    <!-- green status -->
    <div class="card green-status">
      <div class="gs-left">
        <svg width="20" height="28" viewBox="0 0 20 28" fill="none">
          <rect x="1.2" y="1.2" width="17.6" height="25.6" rx="4.5" stroke="var(--green)" stroke-width="2.2"/>
          <path d="M10 6l-3.4 7h3.2l-3 8 8-9.5h-3.4L14 6z" fill="var(--green)"/>
        </svg>
        <div class="gs-title">Green status</div>
      </div>
      <div class="gs-right">In progress</div>
    </div>

    <!-- savings -->
    <div class="card savings">
      <div class="sv-label">Savings</div>
      <div class="sv-amt">$57.71</div>
      <div class="sv-sub">Up to 3.25% interest</div>
      <div class="sv-icons"></div>
    </div>

    <!-- more for you -->
    <div class="more-title">More for you</div>

    <!-- bottom peeking card -->
    <div class="bottom">
      <div class="b-head">Bitcoin</div>
      <div class="b-title">Buy and sell</div>
    </div>

    <!-- nav bar -->
    <div class="navbar">
      <div class="chip">$3</div>
      <div class="nav-ico"><span class="dollar">$</span></div>
      <div class="nav-ico">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="2"/>
          <path d="M12 7v5l3.2 2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="badge">4</span>
      </div>
    </div>

    <div class="home-ind"></div>
  </div>
</body>
</html>
